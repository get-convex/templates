name: Update AI files

on:
  workflow_dispatch: # manual trigger
  schedule:
    - cron: "0 20 * * 1-5" # every weekday 20:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update-ai-files:
    name: Regenerate AI files and open a PR
    runs-on: ubuntu-latest
    steps:
      # A GitHub App token (rather than the default GITHUB_TOKEN) is used so that
      # the PR it opens triggers other workflows (e.g. CI). PRs created with the
      # default GITHUB_TOKEN do not trigger `pull_request` workflows.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TEMPLATES_CI_APP_ID }}
          private-key: ${{ secrets.TEMPLATES_CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: oven-sh/setup-bun@v2

      - uses: extractions/setup-just@v3

      - name: Regenerate AI files
        run: just update-ai-files

      - name: Create PR if changed
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: github-actions/update-ai-files
          delete-branch: true
          base: main
          commit-message: "Update AI files in templates"
          title: "Update AI files in templates"
          reviewers: Nicolapps
          body: |
            Automated update of Convex AI files in the templates, generated by
            the scheduled `Update AI files` workflow (`just update-ai-files`).
